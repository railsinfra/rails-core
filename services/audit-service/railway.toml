[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "audit-service"
internalPort = 8080

[[services]]
name = "audit-grpc"
internalPort = 50054
protocol = "grpc"
