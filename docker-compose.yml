# Rails-core: single entry via nginx on host port 8080.
# Requires: cp .env.example .env and external Postgres URLs (Neon, etc.).
# Services are vendored under services/ (see make bootstrap).

services:
  gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs:/usr/share/nginx/html/docs:ro
    depends_on:
      users-service:
        condition: service_healthy
      accounts-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  users-service:
    # home crate (transitive) requires rustc 1.88+; keep in sync with accounts-service.
    # prost-build needs `protoc` (protobuf-compiler) at compile time.
    image: rust:1.88-bookworm
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/users-service:/app
    environment:
      DATABASE_URL: ${USERS_DATABASE_URL}
      SERVER_ADDR: "0.0.0.0:8080"
      GRPC_PORT: "50051"
      ACCOUNTS_GRPC_URL: http://accounts-service:9090
      RUST_LOG: ${RUST_LOG:-info}
    command: bash -c "export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -y -qq protobuf-compiler && cargo run --release"
    expose:
      - "8080"
      - "50051"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 1200s

  accounts-service:
    image: rust:1.88-bookworm
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/accounts-service:/app
    environment:
      DATABASE_URL: ${ACCOUNTS_DATABASE_URL}
      PORT: "8080"
      GRPC_PORT: "9090"
      USERS_GRPC_URL: http://users-service:50051
      LEDGER_GRPC_URL: http://ledger-service:50053
      RUST_LOG: ${RUST_LOG:-info}
    command: bash -c "export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -y -qq protobuf-compiler && cargo run --release"
    expose:
      - "8080"
      - "9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:8080/health >/dev/null"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 1200s

  ledger-service:
    image: ruby:3.3.0-bookworm
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./services/ledger-service:/app
    environment:
      DATABASE_URL: ${LEDGER_DATABASE_URL}
      RAILS_ENV: development
      PORT: "3000"
      GRPC_PORT: "50053"
    # ledger-db may be empty after Neon bootstrap; create tables before gRPC/Puma.
    command: bash -c "bundle install && bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p 3000"
    expose:
      - "3000"
      - "50053"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 http://127.0.0.1:3000/health >/dev/null"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 900s
