# Rails-core: single entry via nginx on host port 8080.
# Requires: cp .env.example .env and external Postgres URLs (Neon, etc.).
# Requires: git submodule update --init (see make bootstrap).

services:
  gateway:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs:/usr/share/nginx/html/docs:ro
    depends_on:
      - users-service
      - accounts-service
      - ledger-service

  users-service:
    # 1.85+ required: transitive crates may use Cargo.toml edition 2024 (e.g. home).
    image: rust:1.85-bookworm
    working_dir: /app
    volumes:
      - ./services/users-service:/app
    environment:
      DATABASE_URL: ${USERS_DATABASE_URL}
      HTTP_PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}
    command: bash -c "cargo run --release"
    expose:
      - "8080"

  accounts-service:
    image: rust:1.85-bookworm
    working_dir: /app
    volumes:
      - ./services/accounts-service:/app
    environment:
      DATABASE_URL: ${ACCOUNTS_DATABASE_URL}
      PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}
    command: bash -c "cargo run --release"
    expose:
      - "8080"

  ledger-service:
    image: ruby:3.3.0-bookworm
    working_dir: /app
    volumes:
      - ./services/ledger-service:/app
    environment:
      DATABASE_URL: ${LEDGER_DATABASE_URL}
      RAILS_ENV: development
      PORT: "3000"
    command: bash -c "bundle install && bundle exec rails server -b 0.0.0.0 -p 3000"
    expose:
      - "3000"
