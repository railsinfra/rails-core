worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Backend services (Docker Compose DNS names)
    upstream users_upstream {
        server users-service:8080;
    }
    upstream accounts_upstream {
        server accounts-service:8080;
    }
    upstream ledger_upstream {
        server ledger-service:3000;
    }

    server {
        listen 80;
        server_name _;
        # Host is published as :8080 on the machine; default absolute redirects use
        # listen port 80 and become http://localhost/docs/ (wrong). Preserve client Host + port.
        absolute_redirect off;

        # Liveness for the gateway itself (nginx static; does not probe backends).
        location = /health {
            default_type application/json;
            return 200 '{"status":"healthy"}';
        }

        # Public API surface (path prefix stripped when forwarding)
        location /users/ {
            proxy_pass http://users_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /accounts/ {
            proxy_pass http://accounts_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ledger/ {
            proxy_pass http://ledger_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static developer docs shipped with the monorepo
        location /docs/ {
            alias /usr/share/nginx/html/docs/;
            autoindex on;
        }

        location = / {
            return 302 http://$http_host/docs/;
        }
    }
}
