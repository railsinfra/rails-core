syntax = "proto3";

package rails.core.accounts.v1;

option java_multiple_files = true;
option java_package = "rails.core.accounts.v1";
option go_package = "github.com/railsinfra/proto/gen/go/rails/core/accounts/v1;accountsv1";

// v1 — accounts, balances, transfer orchestration (not ledger double-entry).
service AccountsV1 {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}
