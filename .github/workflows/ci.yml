name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.3.0"

jobs:
  compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        env:
          USERS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/users_ci
          ACCOUNTS_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/accounts_ci
          LEDGER_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledger_ci
          AUDIT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/audit_ci
        run: docker compose config --quiet

  rust-users:
    name: users-service (clippy, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: users_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/users_test
    defaults:
      run:
        working-directory: services/users-service
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/users-service
      - run: cargo clippy --locked --all-targets
      - run: cargo test --locked -- --include-ignored

  rust-audit:
    name: audit-service (clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/audit-service
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/audit-service
      - run: cargo clippy --locked --all-targets
      - run: cargo test --locked -- --include-ignored

  rust-accounts:
    name: accounts-service (clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/accounts-service
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/accounts-service
      - run: cargo clippy --locked --all-targets
      - run: cargo test --locked -- --include-ignored

  ledger-rails:
    name: ledger-service (test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledger_test
    defaults:
      run:
        working-directory: services/ledger-service
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: services/ledger-service
      - run: bundle exec rails db:test:prepare test

  # SonarQube scan disabled for now; keep Rust + Ledger coverage and Codecov uploads.
  coverage:
    name: Coverage (Codecov)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
    env:
      RUST_VERSION: stable
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ledger_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/users-service -> target
            services/accounts-service -> target
            services/audit-service -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Create Postgres database for users-service coverage
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'users_service_cov'" | grep -q 1 \
            || PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "CREATE DATABASE users_service_cov;"

      - name: Rust coverage (users-service)
        working-directory: services/users-service
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/users_service_cov
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/coverage-rust"
          cargo llvm-cov test --locked --lcov --output-path "${GITHUB_WORKSPACE}/coverage-rust/users.lcov.info" \
            --fail-under-lines 90 \
            --ignore-filename-regex '(^|/)src/(main|bootstrap)\.rs$' \
            -- --include-ignored

      - name: Rust coverage (accounts-service)
        working-directory: services/accounts-service
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/coverage-rust"
          cargo llvm-cov test --locked --lcov --output-path "${GITHUB_WORKSPACE}/coverage-rust/accounts.lcov.info" \
            -- --include-ignored

      - name: Rust coverage (audit-service)
        working-directory: services/audit-service
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/coverage-rust"
          cargo llvm-cov test --locked --lcov --output-path "${GITHUB_WORKSPACE}/coverage-rust/audit.lcov.info" \
            --ignore-filename-regex '(^|/)src/main\.rs$' \
            -- --include-ignored

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: services/ledger-service

      - name: Ledger coverage (Rails tests)
        working-directory: services/ledger-service
        env:
          COVERAGE: "true"
        run: bundle exec rails db:test:prepare test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: >-
            coverage-rust/users.lcov.info,
            coverage-rust/accounts.lcov.info,
            coverage-rust/audit.lcov.info,
            services/ledger-service/coverage/lcov.info

      # - name: SonarQube Scan
      #   uses: SonarSource/sonarqube-scan-action@v6
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-builds:
    name: Dockerfile build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [users-service, accounts-service, audit-service, ledger-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          if [ "${{ matrix.service }}" = "ledger-service" ]; then
            docker build -f "services/ledger-service/Dockerfile" "services/ledger-service"
          else
            # Rust services use sibling `services/audit-service` (accounts/users) and/or `../../proto`; context must be repo root.
            docker build -f "services/${{ matrix.service }}/Dockerfile" .
          fi
